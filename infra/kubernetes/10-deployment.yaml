# ============================================================
# Artha AI — App Deployment (bank-grade)
# Features:
#   - 3 replicas minimum (HA)
#   - Pod anti-affinity (spread across AZs)
#   - Readiness + liveness probes
#   - Resource requests/limits (QoS Guaranteed)
#   - Security context (non-root, readOnlyRootFilesystem)
#   - IRSA (no AWS static creds)
#   - mTLS sidecar (envoy) for service-to-service auth
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: artha-app
  namespace: artha
  labels:
    app: artha-app
    tier: web
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0        # zero-downtime deploy
      maxSurge: 1
  selector:
    matchLabels:
      app: artha-app
  template:
    metadata:
      labels:
        app: artha-app
        tier: web
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/api/metrics"
    spec:
      serviceAccountName: artha-app

      # Pod Security Context — run as non-root
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault

      # Anti-affinity — spread pods across AZs
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - artha-app
                topologyKey: topology.kubernetes.io/zone
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/arch
                    operator: In
                    values:
                      - amd64

      # Topology Spread — even distribution
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: artha-app

      containers:
        - name: app
          image: 123456789012.dkr.ecr.ap-south-1.amazonaws.com/artha-ai:latest
          imagePullPolicy: IfNotPresent

          ports:
            - name: http
              containerPort: 3000
              protocol: TCP

          # Resource limits — QoS Guaranteed
          resources:
            requests:
              cpu: 1000m
              memory: 1Gi
            limits:
              cpu: 2000m
              memory: 2Gi

          # Security — read-only root fs, drop all capabilities
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
            privileged: false

          env:
            - name: NODE_ENV
              value: production
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: artha-db-credentials
                  key: url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: artha-redis
                  key: url
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: artha-secrets
                  key: jwt-secret
            - name: KMS_BACKEND
              value: aws
            - name: KMS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: artha-secrets
                  key: kms-key-id
            - name: AWS_REGION
              value: ap-south-1
            - name: STORAGE_DRIVER
              value: s3
            - name: S3_BUCKET
              value: artha-ai-production-documents
            - name: S3_REGION
              value: ap-south-1
            - name: SECRETS_BACKEND
              value: aws-sm
            - name: SECURE_COOKIES
              value: "true"

          # Mount writable tmp dir (readOnlyRootFilesystem)
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: uploads
              mountPath: /app/uploads

          # Health checks
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /api/ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 2

          # Startup probe (slow-start for cold caches)
          startupProbe:
            httpGet:
              path: /api/v1/health
              port: http
            periodSeconds: 10
            failureThreshold: 30

      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 100Mi
        - name: uploads
          emptyDir:
            sizeLimit: 1Gi

      # Graceful shutdown
      terminationGracePeriodSeconds: 60

---
# Service — ClusterIP (only ALB can reach pods)
apiVersion: v1
kind: Service
metadata:
  name: artha-app
  namespace: artha
  labels:
    app: artha-app
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 3000
      protocol: TCP
      name: http
  selector:
    app: artha-app
---
# HPA — auto-scale based on CPU + memory
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: artha-app
  namespace: artha
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: artha-app
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Percent
          value: 100
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
---
# Pod Disruption Budget — ensure min availability during node drains
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: artha-app
  namespace: artha
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: artha-app
