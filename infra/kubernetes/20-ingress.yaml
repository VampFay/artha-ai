# ============================================================
# Ingress + cert-manager + mTLS
# ============================================================
---
# Ingress — TLS termination, rate limiting
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: artha-app
  namespace: artha
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/ssl-policy: ELBSecurityPolicy-TLS13-1-2-2021-06
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'
    alb.ingress.kubernetes.io/ssl-redirect: '443'
    alb.ingress.kubernetes.io/load-balancer-attributes: idle_timeout.timeout_seconds=60
    alb.ingress.kubernetes.io/healthcheck-path: /api/v1/health
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: '30'
    alb.ingress.kubernetes.io/healthcheck-timeout-seconds: '5'
    alb.ingress.kubernetes.io/healthy-threshold-count: '2'
    alb.ingress.kubernetes.io/unhealthy-threshold-count: '2'
    # WAF association
    alb.ingress.kubernetes.io/wafv2-acl-arn: arn:aws:wafv2:ap-south-1:123456789012:webacl/artha-ai-production-waf/abc123
spec:
  rules:
    - host: api.artha.ai
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: artha-app
                port:
                  number: 80
---
# Network Policy — restrict ingress to ALB subnets only
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-alb-ingress
  namespace: artha
spec:
  podSelector:
    matchLabels:
      app: artha-app
  ingress:
    - from:
        - namespaceSelector: {}
          # ALB subnet CIDRs
        - ipBlock:
            cidr: 10.0.1.0/24
        - ipBlock:
            cidr: 10.0.2.0/24
        - ipBlock:
            cidr: 10.0.3.0/24
      ports:
        - protocol: TCP
          port: 3000
  policyTypes:
    - Ingress
