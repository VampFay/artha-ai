# ============================================================
# External Secrets Operator — sync from AWS Secrets Manager
# ============================================================
---
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: artha-aws-sm
  namespace: artha
spec:
  provider:
    aws:
      service: SecretsManager
      region: ap-south-1
      auth:
        jwt:
          serviceAccountRef:
            name: artha-app
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: artha-db-credentials
  namespace: artha
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: artha-aws-sm
    kind: SecretStore
  target:
    name: artha-db-credentials
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        url: "postgresql://{{ .username }}:{{ .password }}@{{ .host }}:5432/{{ .dbname }}?sslmode=require"
  data:
    - secretKey: username
      remoteRef:
        key: artha-ai-production/db/credentials
        property: username
    - secretKey: password
      remoteRef:
        key: artha-ai-production/db/credentials
        property: password
    - secretKey: host
      remoteRef:
        key: artha-ai-production/db/credentials
        property: host
    - secretKey: dbname
      remoteRef:
        key: artha-ai-production/db/credentials
        property: dbname
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: artha-redis
  namespace: artha
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: artha-aws-sm
    kind: SecretStore
  target:
    name: artha-redis
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        url: "rediss://:{{ .auth_token }}@{{ .host }}:6379/0"
  data:
    - secretKey: auth_token
      remoteRef:
        key: artha-ai-production/redis/auth
        property: auth_token
    - secretKey: host
      remoteRef:
        key: artha-ai-production/redis/auth
        property: host
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: artha-secrets
  namespace: artha
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: artha-aws-sm
    kind: SecretStore
  target:
    name: artha-secrets
    creationPolicy: Owner
  data:
    - secretKey: jwt-secret
      remoteRef:
        key: artha-ai-production/jwt
        property: secret
    - secretKey: kms-key-id
      remoteRef:
        key: artha-ai-production/kms
        property: field_encryption_key_id
